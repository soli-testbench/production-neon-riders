<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Riders</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #ffffff;
      }
      #game-canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0;
      }
    </style>
    <link rel="stylesheet" href="/src/client/ui/styles.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <!-- Connection Status Indicator -->
    <div id="connection-status" class="connecting">Connecting...</div>

    <!-- Lobby Overlay -->
    <div id="lobby-overlay" class="overlay">
      <div class="lobby-container">
        <h1 class="neon-title">NEON RIDERS</h1>
        <p class="subtitle">A Tron-style light bike arena</p>

        <div id="name-section" class="lobby-section">
          <label class="neon-label" for="player-name">RIDER NAME</label>
          <input type="text" id="player-name" class="neon-input" placeholder="Enter your name..." maxlength="16" />
        </div>

        <div id="color-section" class="lobby-section">
          <label class="neon-label">BIKE COLOR</label>
          <div id="color-picker" class="color-picker"></div>
        </div>

        <div id="player-stats-section" class="lobby-section" style="display:none;">
          <div id="player-stats-content" class="player-stats-content"></div>
        </div>

        <div id="menu-buttons" class="lobby-section">
          <button id="btn-quick-play" class="neon-btn neon-btn-quickplay">QUICK PLAY</button>
          <button id="btn-create-room" class="neon-btn neon-btn-primary">CREATE ROOM</button>
          <div class="join-row">
            <input type="text" id="room-code-input" class="neon-input" placeholder="Room code..." maxlength="5" />
            <button id="btn-join-room" class="neon-btn">JOIN ROOM</button>
          </div>
          <button id="btn-toggle-leaderboard" class="neon-btn neon-btn-leaderboard">LEADERBOARD</button>
        </div>

        <div id="leaderboard-section" class="lobby-section" style="display:none;">
          <div class="leaderboard-header">
            <span class="neon-label">TOP RIDERS</span>
            <button id="btn-close-leaderboard" class="neon-btn-close">&times;</button>
          </div>
          <div id="leaderboard-content" class="leaderboard-content">
            <p class="leaderboard-loading">Loading...</p>
          </div>
        </div>

        <div id="room-section" class="lobby-section" style="display:none;">
          <div class="room-header">
            <span class="neon-label">ROOM CODE:</span>
            <span id="room-code-display" class="room-code"></span>
            <button id="btn-copy-room-code" class="neon-btn-copy" type="button" title="Copy room code">COPY</button>
            <button id="btn-share-room" class="neon-btn-copy" type="button" title="Share join link" style="display:none;">SHARE</button>
          </div>
          <div id="player-list" class="player-list"></div>
          <div id="ai-controls" class="ai-controls" style="display:none;">
            <button id="btn-add-ai" class="neon-btn neon-btn-ai">+ ADD BOT</button>
            <button id="btn-remove-ai" class="neon-btn neon-btn-ai">- REMOVE BOT</button>
          </div>
          <button id="btn-start-game" class="neon-btn neon-btn-primary" style="display:none;">START GAME</button>
          <div id="countdown-display" class="countdown" style="display:none;"></div>
          <button id="btn-leave-room" class="neon-btn neon-btn-danger">LEAVE ROOM</button>
        </div>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameover-overlay" class="overlay" style="display:none;">
      <div class="gameover-container">
        <h2 class="neon-title gameover-title">GAME OVER</h2>
        <p id="gameover-message" class="subtitle"></p>
        <button id="btn-play-again" class="neon-btn neon-btn-primary" style="display:none;">PLAY AGAIN</button>
        <button id="btn-back-lobby" class="neon-btn" style="margin-top:12px;">BACK TO LOBBY</button>
      </div>
    </div>

    <!-- Spectator Label -->
    <div id="spectator-label"></div>

    <!-- Kill Feed -->
    <div id="kill-feed" style="display:none;"></div>

    <!-- HUD -->
    <div id="hud" style="display:none;">
      <div id="hud-players" class="hud-players"></div>
    </div>

    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
